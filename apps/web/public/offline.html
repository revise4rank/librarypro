<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LibraryPro Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fbf6ee 0%, #fffaf3 52%, #f6efe4 100%);
        color: #1f2a24;
        font-family: system-ui, sans-serif;
      }
      .card {
        width: min(92vw, 520px);
        border: 1px solid #e6d9c8;
        border-radius: 28px;
        background: rgba(255, 249, 241, 0.96);
        padding: 28px;
        box-shadow: 0 18px 40px rgba(111, 95, 74, 0.08);
      }
      h1 { margin: 0 0 12px; font-size: 2rem; }
      p { margin: 0; line-height: 1.8; color: #5a655e; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>LibraryPro is offline</h1>
      <p>Your installed app is still available. QR actions queued in offline mode will sync when internet comes back.</p>
    </main>
  </body>
  </html>
